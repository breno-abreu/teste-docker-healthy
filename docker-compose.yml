services:
  postgres:
    image: postgres:18-alpine
    container_name: healthy-postgres
    profiles:
      - vm
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: zfu2vyaf
      POSTGRES_DB: HealthyDataBase
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+: montar /var/lib/postgresql (não /var/lib/postgresql/data)
      - postgres_data_18:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d HealthyDataBase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthy-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=HealthyDataBase;Username=root;Password=zfu2vyaf"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    container_name: healthy-caddy
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data_18:
